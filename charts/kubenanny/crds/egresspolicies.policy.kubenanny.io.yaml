apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: egresspolicies.policy.kubenanny.io
spec:
  group: policy.kubenanny.io
  names:
    kind: EgressPolicy
    listKind: EgressPolicyList
    plural: egresspolicies
    singular: egresspolicy
    shortNames:
      - ep
      - egp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - podSelector
                - allowedHostnames
              properties:
                podSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string
                  x-kubernetes-map-type: atomic
                allowedHostnames:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    maxLength: 253
                    pattern: '^(\*\.)?[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?)*$'
                defaultAction:
                  type: string
                  enum:
                    - allow
                    - deny
                  default: deny
            status:
              type: object
              properties:
                enforced:
                  type: boolean
                matchedPods:
                  type: integer
                  format: int32
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Enforced
          type: boolean
          jsonPath: .status.enforced
        - name: Pods
          type: integer
          jsonPath: .status.matchedPods
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
