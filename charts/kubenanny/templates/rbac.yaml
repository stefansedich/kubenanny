apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubenanny.fullname" . }}
  labels:
    {{- include "kubenanny.labels" . | nindent 4 }}
rules:
  - apiGroups: ["policy.kubenanny.io"]
    resources: ["egresspolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy.kubenanny.io"]
    resources: ["egresspolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubenanny.fullname" . }}
  labels:
    {{- include "kubenanny.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubenanny.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubenanny.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
